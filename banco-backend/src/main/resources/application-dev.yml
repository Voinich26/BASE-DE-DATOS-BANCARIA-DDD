# ── Perfil: development ───────────────────────────────────────────────────────
# Activa con: -Dspring.profiles.active=dev  o  SPRING_PROFILES_ACTIVE=dev

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.banco.ddd: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Swagger habilitado en dev (ya está habilitado por defecto, esto es explícito)
springdoc:
  swagger-ui:
    try-it-out-enabled: true
